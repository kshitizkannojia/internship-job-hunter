<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Internship Hunter{% endblock %}</title>

  <!-- Tailwind CSS (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            accent: { 50:'#eff6ff', 100:'#dbeafe', 200:'#bfdbfe', 300:'#93c5fd', 400:'#60a5fa', 500:'#4b7cf3', 600:'#4365d8', 700:'#3751b5', 800:'#2e4399', 900:'#1e3a5f' },
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        }
      }
    }
  </script>

  <!-- HTMX — dynamic partial page updates without JS -->
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>

  <!-- Alpine.js — small client-side interactivity (modals, toggles) -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- Chart.js — for the reply rate chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>

  <!-- Inter font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Custom styles -->
  <link rel="stylesheet" href="/static/css/style.css">
</head>

<body class="h-full bg-gray-50 font-sans text-gray-900 antialiased" x-data="{ sidebarOpen: false, darkMode: false }" :class="{ 'dark': darkMode }">

  <div class="flex h-full">
    <!-- ── Sidebar ──────────────────────────────────────────── -->
    <aside class="hidden lg:flex lg:w-64 lg:flex-col border-r border-gray-200 bg-white">
      <div class="flex h-16 items-center gap-2 border-b px-6">
        <svg class="h-7 w-7 text-accent-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
        </svg>
        <span class="text-lg font-bold text-gray-900">Internship Hunter</span>
      </div>

      <nav class="flex-1 px-4 py-4 space-y-1">
        <a href="/" class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm transition-colors {% block nav_dashboard %}{% endblock %}">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1"/></svg>
          Dashboard
        </a>
        <a href="/emails" class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm transition-colors {% block nav_emails %}{% endblock %}">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          Emails
        </a>
        <a href="/settings" class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm transition-colors {% block nav_settings %}{% endblock %}">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          Settings
        </a>
      </nav>

      <div class="border-t px-4 py-3">
        <p class="text-xs text-gray-400">v2.0 — Python Edition</p>
      </div>
    </aside>

    <!-- ── Mobile sidebar overlay ───────────────────────────── -->
    <div x-show="sidebarOpen" x-transition.opacity @click="sidebarOpen = false"
         class="fixed inset-0 z-40 bg-black/30 lg:hidden"></div>

    <aside x-show="sidebarOpen" x-transition:enter="transition ease-out duration-200"
           x-transition:enter-start="-translate-x-full" x-transition:enter-end="translate-x-0"
           x-transition:leave="transition ease-in duration-150"
           x-transition:leave-start="translate-x-0" x-transition:leave-end="-translate-x-full"
           class="fixed inset-y-0 left-0 z-50 w-64 bg-white border-r lg:hidden">
      <div class="flex h-16 items-center justify-between border-b px-6">
        <span class="text-lg font-bold">Internship Hunter</span>
        <button @click="sidebarOpen = false" class="text-gray-400 hover:text-gray-600">
          <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <nav class="px-4 py-4 space-y-1">
        <a href="/" class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm" @click="sidebarOpen=false">Dashboard</a>
        <a href="/emails" class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm" @click="sidebarOpen=false">Emails</a>
        <a href="/settings" class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm" @click="sidebarOpen=false">Settings</a>
      </nav>
    </aside>

    <!-- ── Main content ─────────────────────────────────────── -->
    <div class="flex flex-1 flex-col overflow-hidden">
      <!-- Header -->
      <header class="flex h-16 items-center justify-between border-b border-gray-200 bg-white px-6">
        <div class="flex items-center gap-4">
          <button @click="sidebarOpen = true" class="lg:hidden text-gray-500 hover:text-gray-700">
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
          </button>
          <h1 class="text-lg font-semibold text-gray-900">{% block page_title %}Dashboard{% endblock %}</h1>
        </div>
        <div class="flex items-center gap-3">
          <button @click="darkMode = !darkMode" class="rounded-lg p-2 text-gray-400 hover:text-gray-600 hover:bg-gray-100">
            <svg x-show="!darkMode" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
            <svg x-show="darkMode" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
          </button>
          <div class="h-8 w-8 rounded-full bg-accent-600 flex items-center justify-center text-white text-sm font-semibold">K</div>
        </div>
      </header>

      <!-- Page content -->
      <main class="flex-1 overflow-y-auto p-6">
        {% block content %}{% endblock %}
      </main>
    </div>
  </div>

  {% block scripts %}{% endblock %}
</body>
</html>
