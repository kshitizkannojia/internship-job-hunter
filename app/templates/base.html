<!DOCTYPE html>
<html lang="en" class="h-full dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Internship Hunter{% endblock %}</title>

  <!-- Tailwind CSS (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            accent: { 50:'#faf5ff', 100:'#f3e8ff', 200:'#e9d5ff', 300:'#d8b4fe', 400:'#c084fc', 500:'#a855f7', 600:'#9333ea', 700:'#7e22ce', 800:'#6b21a8', 900:'#581c87' },
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        }
      }
    }
  </script>

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>

  <!-- Monaco Editor CDN -->
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.min.js"></script>

  <!-- Inter font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Custom styles -->
  <link rel="stylesheet" href="/static/css/style.css">
</head>

<body class="h-full font-sans antialiased bg-black text-gray-100"
      x-data="appShell()">

  <!-- Aurora glow backgrounds (animated via CSS) -->
  <div class="aurora-bg"></div>
  <div class="aurora-bg-2"></div>

  <div class="flex h-full relative z-10">
    <!-- Sidebar (desktop) -->
    <aside class="hidden lg:flex lg:w-60 lg:flex-col border-r border-[#111] bg-[#050505]">
      <div class="flex h-14 items-center gap-2.5 border-b border-[#111] px-5">
        <div class="logo-icon flex h-8 w-8 items-center justify-center rounded-lg bg-accent-600 cursor-pointer">
          <svg class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
          </svg>
        </div>
        <span class="text-sm font-bold tracking-tight text-gray-100">Internship Hunter</span>
      </div>

      <nav class="flex-1 px-3 py-3 space-y-0.5">
        <a href="/" class="nav-link {% block nav_dashboard %}{% endblock %}">
          <svg class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1"/></svg>
          Dashboard
        </a>
        <a href="/emails" class="nav-link {% block nav_emails %}{% endblock %}">
          <svg class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          Emails
        </a>
        <a href="/settings" class="nav-link {% block nav_settings %}{% endblock %}">
          <svg class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          Settings
        </a>
      </nav>

      <div class="border-t border-[#111] px-4 py-3">
        <p class="text-[11px] tracking-wide uppercase text-[#333]">v2.0 &mdash; Python</p>
      </div>
    </aside>

    <!-- Mobile sidebar overlay -->
    <div x-show="sidebarOpen" x-transition.opacity @click="sidebarOpen = false"
         class="fixed inset-0 z-40 bg-black/60 backdrop-blur-sm lg:hidden"></div>

    <aside x-show="sidebarOpen" x-transition:enter="transition ease-out duration-300"
           x-transition:enter-start="-translate-x-full opacity-0" x-transition:enter-end="translate-x-0 opacity-100"
           x-transition:leave="transition ease-in duration-200"
           x-transition:leave-start="translate-x-0 opacity-100" x-transition:leave-end="-translate-x-full opacity-0"
           class="fixed inset-y-0 left-0 z-50 w-64 border-r border-[#111] bg-[#050505] lg:hidden">
      <div class="flex h-14 items-center justify-between border-b border-[#111] px-5">
        <span class="text-sm font-bold text-gray-100">Internship Hunter</span>
        <button @click="sidebarOpen = false" class="rounded-lg p-1 hover:bg-[#111] text-gray-500 transition-colors">
          <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <nav class="px-3 py-3 space-y-0.5">
        <a href="/" class="nav-link {% block nav_dashboard_mobile %}{% endblock %}" @click="sidebarOpen=false">
          <svg class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1"/></svg>
          Dashboard
        </a>
        <a href="/emails" class="nav-link {% block nav_emails_mobile %}{% endblock %}" @click="sidebarOpen=false">
          <svg class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          Emails
        </a>
        <a href="/settings" class="nav-link {% block nav_settings_mobile %}{% endblock %}" @click="sidebarOpen=false">
          <svg class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          Settings
        </a>
      </nav>
    </aside>

    <!-- Main content -->
    <div class="flex flex-1 flex-col overflow-hidden">
      <!-- Top bar — with scroll-aware blur -->
      <header id="main-header"
              class="flex h-14 items-center justify-between border-b border-[#111] px-4 sm:px-6 bg-[#050505]/80 header-blur">
        <div class="flex items-center gap-3">
          <button @click="sidebarOpen = true" class="lg:hidden rounded-lg p-1.5 hover:bg-[#111] text-gray-500 transition-colors">
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
          </button>
          <h1 class="text-sm font-semibold text-gray-200">{% block page_title %}Dashboard{% endblock %}</h1>
        </div>
        <div class="flex items-center gap-2">
          <div class="user-avatar h-7 w-7 rounded-full bg-accent-600 flex items-center justify-center text-white text-xs font-bold select-none cursor-pointer">K</div>
        </div>
      </header>

      <!-- Page content — with entrance animation -->
      <main id="main-scroll" class="flex-1 overflow-y-auto p-4 sm:p-6">
        <div class="page-enter">
          {% block content %}{% endblock %}
        </div>
      </main>
    </div>
  </div>

  <!-- Toast notification -->
  <div x-data="toastStore()" x-on:toast.window="show($event.detail)"
       class="fixed bottom-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none">
    <template x-for="t in toasts" :key="t.id">
      <div x-show="t.visible" x-transition:enter="transition ease-out duration-300"
           x-transition:enter-start="opacity-0 translate-y-4 scale-95" x-transition:enter-end="opacity-100 translate-y-0 scale-100"
           x-transition:leave="transition ease-in duration-200"
           x-transition:leave-start="opacity-100 scale-100" x-transition:leave-end="opacity-0 scale-95"
           class="toast-enter pointer-events-auto flex items-center gap-2 rounded-lg px-4 py-2.5 text-sm font-medium shadow-lg border backdrop-blur-md"
           :class="t.type === 'success' ? 'bg-green-950/80 text-green-300 border-green-900' : t.type === 'error' ? 'bg-red-950/80 text-red-300 border-red-900' : 'bg-[#111]/80 text-gray-300 border-[#222]'">
        <svg x-show="t.type==='success'" class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        <svg x-show="t.type==='error'" class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        <span x-text="t.message"></span>
      </div>
    </template>
  </div>

  <script>
    /* ── App shell ──────────────────────────────────────────── */
    function appShell() {
      return {
        sidebarOpen: false,
        darkMode: true,
      }
    }

    function toastStore() {
      return {
        toasts: [],
        show(detail) {
          const t = { id: Date.now(), message: detail.message, type: detail.type || 'info', visible: true };
          this.toasts.push(t);
          setTimeout(() => { t.visible = false; }, 3000);
          setTimeout(() => { this.toasts = this.toasts.filter(x => x.id !== t.id); }, 3500);
        }
      }
    }

    /* ── Scroll-triggered animations (IntersectionObserver) ── */
    document.addEventListener('DOMContentLoaded', () => {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('anim-visible');
            entry.target.classList.remove('anim-hidden');
          }
        });
      }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

      // Observe all elements with anim-hidden class
      document.querySelectorAll('.anim-hidden, .anim-stagger').forEach(el => observer.observe(el));

      // Also observe dynamically added elements (for Alpine-rendered content)
      const mutObserver = new MutationObserver((mutations) => {
        mutations.forEach(m => {
          m.addedNodes.forEach(node => {
            if (node.nodeType === 1) {
              if (node.classList?.contains('anim-hidden') || node.classList?.contains('anim-stagger')) {
                observer.observe(node);
              }
              node.querySelectorAll?.('.anim-hidden, .anim-stagger').forEach(el => observer.observe(el));
            }
          });
        });
      });
      mutObserver.observe(document.body, { childList: true, subtree: true });

      /* ── Header scroll shadow ──────────────────────────── */
      const mainScroll = document.getElementById('main-scroll');
      const header = document.getElementById('main-header');
      if (mainScroll && header) {
        mainScroll.addEventListener('scroll', () => {
          header.classList.toggle('scrolled', mainScroll.scrollTop > 8);
        }, { passive: true });
      }

      /* ── Animated number counters ──────────────────────── */
      window.animateCounter = function(el, target, duration = 800) {
        if (!el || isNaN(target)) return;
        const start = parseInt(el.textContent) || 0;
        const range = target - start;
        if (range === 0) { el.textContent = target; return; }
        const startTime = performance.now();
        function tick(now) {
          const elapsed = now - startTime;
          const progress = Math.min(elapsed / duration, 1);
          // Ease out expo
          const eased = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress);
          el.textContent = Math.round(start + range * eased);
          if (progress < 1) requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
      };
    });
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
